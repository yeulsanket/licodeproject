services:
  # ─── Single Service: Build React then serve via Flask ─────────────────────
  - type: web
    name: student-analyzer
    env: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: >
      cd frontend-react && npm ci && npm run build &&
      cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: student_analyzer
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
