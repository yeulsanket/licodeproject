services:
  # ─── Single Backend Service (serves API + Frontend) ─────────────────────────
  - type: web
    name: student-analyzer
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: MONGO_URI
        sync: false          # Set manually in Render dashboard
      - key: MONGO_DB_NAME
        value: student_analyzer
      - key: GROQ_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
